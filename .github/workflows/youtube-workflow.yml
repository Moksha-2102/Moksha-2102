name: Latest YouTube Videos Workflow
on:
  schedule:
    # Runs automatically every 12 hours
    - cron: '0 */12 * * *'
  workflow_dispatch: # Allows manual trigger anytime

jobs:
  update-readme-with-youtube:
    name: Update this repo's README with latest videos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Pull YouTube Videos
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          comment_tag_name: "YOUTUBE-VIDEOS-LIST"
          feed_list: "https://www.youtube.com/feeds/videos.xml?channel_id=UCO3XRyNye19LEUGDlEZCznQ"
